<!DOCTYPE html>
<html lang="th">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>The Portal - perfume.studio.kk</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cinzel:wght@400&family=Sarabun:wght@200;300&display=swap" rel="stylesheet">


   <style>
       body {
           background-color: #05010a;
           color: white;
           font-family: 'Sarabun', sans-serif;
           margin: 0;
           overflow: hidden;
       }


       .font-calligraphy { font-family: 'Pinyon Script', cursive; }
       .font-elegant { font-family: 'Cinzel', serif; }


       /* --- พื้นหลังรวม: มืดเบลอฟุ้งเหมือนหน้าแรก --- */
       .portal-bg {
           height: 100vh;
           width: 100%;
           position: relative;
           background-image: url('https://scontent.fbkk5-6.fna.fbcdn.net/v/t39.30808-6/506046049_725940627045932_9161134506939914429_n.jpg?_nc_cat=102&ccb=1-7&_nc_sid=13d280&_nc_ohc=CopkT0fHXZUQ7kNvwHAZ4s3&_nc_oc=Adkdqu9aC_Ek4YDIntV6kJNGC9sxBTbPKH4CBqIMGzbDWAR0wDlc61x43pY1B9zvOxw&_nc_zt=23&_nc_ht=scontent.fbkk5-6.fna&_nc_gid=tkfhD_DC-VT1rcsNGoVEMw&_nc_ss=8&oh=00_AfzYciIvv7PGIri64wftBDRkaualj6_t2Nx33Ephy0ZEuA&oe=69BEF8CB');
           background-size: cover;
           background-position: center;
       }


       .overlay {
           position: absolute;
           inset: 0;
           backdrop-filter: blur(30px);
           -webkit-backdrop-filter: blur(30px);
           background: linear-gradient(to right, rgba(5,1,10,0.9) 0%, rgba(15,5,25,0.7) 50%, rgba(5,1,10,0.9) 100%);
       }


       /* --- Split Screen Effects --- */
       .gender-side {
           position: relative;
           transition: all 1s cubic-bezier(0.2, 1, 0.3, 1);
           cursor: pointer;
           overflow: hidden;
       }


       /* เส้นแบ่งกลางบางๆ */
       .center-line {
           position: absolute;
           left: 50%;
           top: 50%;
           transform: translate(-50%, -50%);
           width: 1px;
           height: 60%;
           background: linear-gradient(to bottom, transparent, rgba(212, 175, 55, 0.3), transparent);
           z-index: 20;
       }


       .gold-soft {
           color: #d4af37;
           letter-spacing: 0.4em;
       }


       /* Hover Effect: ขยายฝั่งที่เลือก */
       .gender-side:hover {
           flex-grow: 1.5;
           background: rgba(212, 175, 55, 0.03);
       }


       .gender-side:hover .gold-soft {
           text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
           color: white;
       }


       /* แสงออนๆ ประจำฝั่ง */
       .side-glow {
           position: absolute;
           width: 300px;
           height: 300px;
           border-radius: 50%;
           filter: blur(80px);
           opacity: 0.1;
           z-index: 1;
           transition: opacity 0.8s;
       }


       .gender-side:hover .side-glow {
           opacity: 0.25;
       }
   </style>
</head>
<body>


   <div class="portal-bg">
       <div class="overlay"></div>
       <div class="center-line"></div>


       <nav class="fixed top-0 w-full z-50 py-10 px-12">
           <div class="flex flex-col items-center text-center">
               <span class="font-elegant text-xs gold-soft uppercase">perfume.studio.kk</span>
               <span class="font-calligraphy text-lg text-gray-400 mt-[-2px] opacity-70">The Portal of Choice</span>
           </div>
       </nav>

<div class="relative z-10 flex h-screen w-full">
    
    <div onclick="selectGender('man')" class="gender-side flex-1 flex flex-col items-center justify-center border-r border-white/5">
        <div class="side-glow bg-blue-900"></div>
        <div class="relative z-10 text-center">
            <span class="font-calligraphy text-[#d4af37] text-4xl mb-4 block opacity-60">The Essence of</span>
            <h2 class="font-elegant text-3xl md:text-5xl gold-soft uppercase">For Man</h2>
            <p class="font-light text-[10px] tracking-[0.4em] text-gray-500 mt-6 uppercase">Strength & Sophistication</p>
        </div>
    </div>

    <div onclick="selectGender('woman')" class="gender-side flex-1 flex flex-col items-center justify-center">
        <div class="side-glow bg-purple-800"></div>
        <div class="relative z-10 text-center">
            <span class="font-calligraphy text-[#d4af37] text-4xl mb-4 block opacity-60">The Aura of</span>
            <h2 class="font-elegant text-3xl md:text-5xl gold-soft uppercase">For Woman</h2>
            <p class="font-light text-[10px] tracking-[0.4em] text-gray-500 mt-6 uppercase">Grace & Mystery</p>
        </div>
    </div>

</div>




       <div class="absolute bottom-12 w-full text-center z-20">
           <p class="font-elegant text-[10px] tracking-[0.6em] text-gray-400 opacity-40 uppercase">
               Choose your energy to begin the ritual
           </p>
       </div>
   </div>


<script>
    function selectGender(gender) {
        // 1. บันทึกค่าเพศไว้ (เผื่อเอาไปใช้หน้าถัดไป)
        localStorage.setItem('selected_gender', gender);
        
        // 2. เล่น Effect จางหน้าจอ
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.8s';
        
        // 3. เช็คเงื่อนไขเพื่อแยกหน้า
        setTimeout(() => {
            if (gender === 'man') {
                window.location.href = 'namhom3.html';   // ลิงก์สำหรับผู้ชาย
            } else if (gender === 'woman') {
                window.location.href = 'namhom4.html'; // ลิงก์สำหรับผู้หญิง
            }
        }, 800);
    }
</script>


</body>
</html>
